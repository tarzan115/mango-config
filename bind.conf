# reload config
# ============================================================
# ============================================================
# Modifier scheme:
#   SUPER            = focus, navigation, primary actions
#   SUPER+SHIFT      = swap, secondary/destructive
#   SUPER+CTRL       = tags/workspace management
#   SUPER+ALT        = resize + focus direction
#   SUPER+CTRL+SHIFT = monitor operations (infrequent)
# ============================================================

# --- Config ---
bind=SUPER,r,spawn_shell,bash ~/.config/mango/scripts/config_check.sh
bind=SUPER,r,reload_config

# menu and terminal
bind=Alt,Return,spawn,foot
bind=Alt,space,spawn,rofi -config ~/.config/mango/rofi/config.rasi -show drun
# bind=Alt,space,spawn,fuzzel

# --- Window Management ---
bind=SUPER,m,quit
bind=SUPER,q,killclient,

# --- Window Focus (SUPER + arrows) ---
bind=SUPER,Tab,focusstack,next
bind=SUPER,BackSpace,focuslast
bind=SUPER+ALT,Left,focusdir,left
bind=SUPER+ALT,Right,focusdir,right
bind=SUPER+ALT,Up,focusdir,up
bind=SUPER+ALT,Down,focusdir,down

# --- Window Swap (SUPER+SHIFT + arrows) ---
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# --- Move Floating Window (SUPER+CTRL + arrows) ---
bind=SUPER+CTRL,Up,movewin,+0,-50
bind=SUPER+CTRL,Down,movewin,+0,+50
bind=SUPER+CTRL,Left,movewin,-50,+0
bind=SUPER+CTRL,Right,movewin,+50,+0

# --- Resize Window (SUPER+CTRL+SHIFT + arrows) ---
bind=SUPER+CTRL+SHIFT,Up,resizewin,+0,-50
bind=SUPER+CTRL+SHIFT,Down,resizewin,+0,+50
bind=SUPER+CTRL+SHIFT,Left,resizewin,-50,+0
bind=SUPER+CTRL+SHIFT,Right,resizewin,+50,+0

# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# switch window status
bind=SUPER,g,toggleglobal,
bind=ALT,Tab,togglejump
bind=ALT,backslash,togglefloating,
bind=ALT,a,togglemaximizescreen,
bind=ALT,f,togglefullscreen,
bind=ALT+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=SUPER,z,toggle_scratchpad

# scroller layout
bind=SUPER,e,set_proportion,1.0
bind=SUPER,x,switch_proportion_preset,
bind=ALT,x,switch_proportion_preset,prev
bind=alt+super+ctrl,Left,scroller_stack,left
bind=alt+super+ctrl,Right,scroller_stack,right
bind=alt+super+ctrl,Up,scroller_stack,up
bind=alt+super+ctrl,Down,scroller_stack,down

#dwindle layout
bind=alt+shift,Return,dwindle_toggle_split_direction

# --- Tile Layout ---
bind=SUPER+SHIFT,e,incnmaster,1
bind=SUPER+SHIFT,t,incnmaster,-1
bind=SUPER,s,zoom,

# switch layout
bind=CTRL+SUPER,i,setlayout,tile
bind=CTRL+SUPER,l,setlayout,scroller
bind=SUPER,n,switch_layout

# --- Tag Switch (SUPER + number/arrow) ---
bind=SUPER,Left,viewtoleft,0
bind=CTRL,Left,viewtoleft_have_client,0
bind=SUPER,Right,viewtoright,0
bind=CTRL,Right,viewtoright_have_client,0
bind=SUPER,1,toggleview,1
bind=SUPER,2,toggleview,2
bind=SUPER,3,toggleview,3
bind=SUPER,4,toggleview,4
bind=SUPER,5,toggleview,5
bind=SUPER,6,toggleview,6
bind=SUPER,7,toggleview,7
bind=SUPER,8,toggleview,8
bind=SUPER,9,toggleview,9

# --- Tag Window (SUPER+CTRL + number/arrow) ---
bind=SUPER+CTRL,Left,tagtoleft,0
bind=SUPER+CTRL,Right,tagtoright,0
bind=SUPER+CTRL,1,tag,1,0
bind=SUPER+CTRL,2,tag,2,0
bind=SUPER+CTRL,3,tag,3,0
bind=SUPER+CTRL,4,tag,4,0
bind=SUPER+CTRL,5,tag,5,0
bind=SUPER+CTRL,6,tag,6,0
bind=SUPER+CTRL,7,tag,7,0
bind=SUPER+CTRL,8,tag,8,0
bind=SUPER+CTRL,9,tag,9,0

# --- View Tag (SUPER+SHIFT + number) ---
bind=SUPER+SHIFT,1,view,1,0
bind=SUPER+SHIFT,2,view,2,0
bind=SUPER+SHIFT,3,view,3,0
bind=SUPER+SHIFT,4,view,4,0
bind=SUPER+SHIFT,5,view,5,0
bind=SUPER+SHIFT,6,view,6,0
bind=SUPER+SHIFT,7,view,7,0
bind=SUPER+SHIFT,8,view,8,0
bind=SUPER+SHIFT,9,view,9,0

# --- Toggle Tag (SUPER+CTRL+SHIFT + number) ---
bind=SUPER+SHIFT+CTRL,1,toggletag,1
bind=SUPER+SHIFT+CTRL,2,toggletag,2
bind=SUPER+SHIFT+CTRL,3,toggletag,3
bind=SUPER+SHIFT+CTRL,4,toggletag,4
bind=SUPER+SHIFT+CTRL,5,toggletag,5
bind=SUPER+SHIFT+CTRL,6,toggletag,6
bind=SUPER+SHIFT+CTRL,7,toggletag,7
bind=SUPER+SHIFT+CTRL,8,toggletag,8
bind=SUPER+SHIFT+CTRL,9,toggletag,9

bind=Ctrl,1,view,1,0
bind=Ctrl,2,view,2,0
bind=Ctrl,3,view,3,0
bind=Ctrl,4,view,4,0
bind=Ctrl,5,view,5,0
bind=Ctrl,6,view,6,0
bind=Ctrl,7,view,7,0
bind=Ctrl,8,view,8,0
bind=Ctrl,9,view,9,0

bind=Alt,1,tag,1,0
bind=Alt,2,tag,2,0
bind=Alt,3,tag,3,0
bind=Alt,4,tag,4,0
bind=Alt,5,tag,5,0
bind=Alt,6,tag,6,0
bind=Alt,7,tag,7,0
bind=Alt,8,tag,8,0
bind=Alt,9,tag,9,0

bind=ctrl+Super,1,toggletag,1
bind=ctrl+Super,2,toggletag,2
bind=ctrl+Super,3,toggletag,3
bind=ctrl+Super,4,toggletag,4
bind=ctrl+Super,5,toggletag,5
bind=ctrl+Super,6,toggletag,6
bind=ctrl+Super,7,toggletag,7
bind=ctrl+Super,8,toggletag,8
bind=ctrl+Super,9,toggletag,9

bind=Super,1,toggleview,1
bind=Super,2,toggleview,2
bind=Super,3,toggleview,3
bind=Super,4,toggleview,4
bind=Super,5,toggleview,5
bind=Super,6,toggleview,6
bind=Super,7,toggleview,7
bind=Super,8,toggleview,8
bind=Super,9,toggleview,9

# --- Monitor (SUPER+CTRL+SHIFT + arrows, infrequent) ---
bind=SUPER+ALT+SHIFT,Left,focusmon,left
bind=SUPER+ALT+SHIFT,Right,focusmon,right
bind=SUPER+ALT+SHIFT,Up,focusmon,up
bind=SUPER+ALT+SHIFT,Down,focusmon,down
bind=SUPER+CTRL+SHIFT,Left,tagmon,left
bind=SUPER+CTRL+SHIFT,Right,tagmon,right
bind=SUPER+CTRL+SHIFT,Up,tagmon,up
bind=SUPER+CTRL+SHIFT,Down,tagmon,down

# --- Gaps ---
bind=SUPER+SHIFT,plus,incgaps,1
bind=SUPER+SHIFT,minus,incgaps,-1
bind=SUPER+SHIFT,g,togglegaps


# ============================================================
# Mouse Bindings
# ============================================================
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_middle,set_proportion,0.5
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=SUPER+CTRL,btn_left,minimized
mousebind=SUPER+CTRL,btn_right,killclient
mousebind=SUPER+CTRL,btn_middle,togglefullscreen
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=NONE,btn_back,toggleoverview

# ============================================================
# Axis Bindings (touchpad/scroll)
# ============================================================
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client
axisbind=SUPER,UP,focusdir,left
axisbind=SUPER,DOWN,focusdir,right
axisbind=SUPER+SHIFT,UP,exchange_client,left
axisbind=SUPER+SHIFT,DOWN,exchange_client,right

# ============================================================
# Gesture Bindings (3/4 finger swipe)
# ============================================================
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down
gesturebind=none,left,4,viewtoleft_have_client
gesturebind=none,right,4,viewtoright_have_client
gesturebind=none,up,4,toggleoverview,1
gesturebind=none,down,4,toggleoverview,1

# brightness and volume
bind=none,XF86AudioRaiseVolume,spawn,~/.config/mango/scripts/volume.sh up
bind=none,XF86AudioLowerVolume,spawn,~/.config/mango/scripts/volume.sh down
bind=none,XF86MonBrightnessUp,spawn,~/.config/mango/scripts/brightness.sh up
bind=none,XF86MonBrightnessDown,spawn,~/.config/mango/scripts/brightness.sh down

#custom app bind
bind=SUPER,Return,spawn,google-chrome
bind=CTRL+SUPER,Return,spawn,foot -e yazi
bind=CTRL+ALT,a,spawn_shell,grim -g "$(slurp -b '#2E2A1E55' -c '#fb751bff')" -t ppm - | satty -f -
bind=SUPER,h,spawn,bash ~/.config/mango/scripts/hide_waybar_mango.sh
bind=SUPER,l,spawn,swaylock -f -c 000000
bind=CTRL+ALT,backslash,spawn,swaync-client -t
bind=CTRL+ALT,BackSpace,spawn,swaync-client -C
bind=SUPER,p,spawn,bash ~/.config/mango/scripts/monitor.sh
bind=SUPER+SHIFT,p,spawn,bash ~/.config/mango/scripts/virmon.sh

